name: ai_study_notes
description: AI-powered study notes generator for students
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.7.0
  retrofit: ^4.1.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  fl_chart: ^0.69.0
  flutter_card_swiper: ^7.0.2
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  modal_bottom_sheet: ^3.0.0
  animations: ^2.0.11
  loading_animation_widget: ^1.2.1

  # Auth
  google_sign_in: ^6.2.1

  # File handling
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  open_filex: ^4.4.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.1.1
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.4.0
  timeago: ^3.7.0
  confetti: ^0.7.0

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  build_runner: ^2.4.12

  riverpod_generator: ^2.3.11

  freezed: ^2.5.2

  json_serializable: ^6.7.1

  retrofit_generator: ^8.1.2

  hive_generator: ^2.0.1

  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

